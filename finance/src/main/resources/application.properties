spring.application.name=finance
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/moonevue}
spring.datasource.username=${DB_USER:moonevue}
spring.datasource.password=${DB_PASS:moone_data_vue}
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.show-sql=${JPA_SHOW_SQL:true}
spring.jpa.properties.hibernate.format_sql=${JPA_FORMAT_SQL:true}
spring.jpa.open-in-view=${JPA_OPEN_IN_VIEW:false}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migrations
spring.flyway.baseline-on-migrate=true