name: Backend CI

on:
  push:
    branches: [main]
    paths:
      - services/backend/**
      - .github/workflows/backend-ci.yml
  pull_request:
    paths:
      - services/backend/**
      - .github/workflows/backend-ci.yml

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Run tests
        run: ./mvnw -B test

      - name: Build all modules
        run: ./mvnw -B -DskipTests package

  docker-build:
    runs-on: ubuntu-latest
    needs: test-and-build
    defaults:
      run:
        working-directory: services/backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build gateway image
        run: docker build -f gateway/Dockerfile -t moonevue/gateway:ci .

      - name: Build auth image
        run: docker build -f auth/Dockerfile -t moonevue/auth:ci .

      - name: Build finance image
        run: docker build -f finance/Dockerfile -t moonevue/finance:ci .
