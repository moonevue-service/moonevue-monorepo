name: Backend Release GHCR

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - services/backend/**
      - .github/workflows/backend-release-ghcr.yml
    tags:
      - "v*"

permissions:
  contents: read
  packages: write

jobs:
  release-images:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        include:
          - service: gateway
            dockerfile: services/backend/gateway/Dockerfile
            context: services/backend
            image: moonevue-gateway
          - service: auth
            dockerfile: services/backend/auth/Dockerfile
            context: services/backend
            image: moonevue-auth
          - service: finance
            dockerfile: services/backend/finance/Dockerfile
            context: services/backend
            image: moonevue-finance

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
