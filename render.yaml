# databases:
#   - name: moonevue-db
#     databaseName: moonevue
#     plan: free
#     type: postgres

services:
  - type: web
    name: moonevue-api
    runtime: docker
    plan: free
    healthCheckPath: /actuator/health
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: "prod"
      - key: PORT
        value: "8080"
      - key: NEON_HOST
        sync: false
      - key: NEON_DATABASE
        sync: false
      - key: NEON_USERNAME
        sync: false
      - key: NEON_PASSWORD
        sync: false
      - key: SPRING_DATASOURCE_URL
        value: jdbc:postgresql://${NEON_HOST}:5432/${NEON_DATABASE}?sslmode=require
