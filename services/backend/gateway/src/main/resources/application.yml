server:
  port: 8080
  forward-headers-strategy: framework

auth:
  base-url: ${AUTH_BASE_URL:http://auth:8081}
  internal-token: ${AUTH_INTERNAL_TOKEN:change-me}
  cookie-name: ${AUTH_COOKIE_NAME:sid}

management:
  endpoints:
    web:
      exposure:
        include: health,info

spring:
  application:
    name: gateway
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://postgres:5432/moonevue}
    username: ${SPRING_DATASOURCE_USERNAME:moonevue}
    password: ${SPRING_DATASOURCE_PASSWORD:moone_data_vue}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: none
  flyway:
    enabled: false

moonevue:
  gateway:
    webhooks:
      hmac:
        secret: ${WEBHOOK_HMAC_SECRET:change-me}
        header: X-Signature
      timestamp:
        header: X-Signature-Timestamp
        skew-seconds: 300

banks:
  efi:
    production: false
# Perfil docker (ativado via SPRING_PROFILES_ACTIVE=docker no docker-compose)
---
spring:
  config:
    activate:
      on-profile: docker
  datasource:
    # Compatível com SPRING_DATASOURCE_* (recomendado) e com DB_* (legado)
    url: ${SPRING_DATASOURCE_URL:${DB_URL:jdbc:postgresql://postgres:5432/moonevue}}
    username: ${SPRING_DATASOURCE_USERNAME:${DB_USER:moonevue}}
    password: ${SPRING_DATASOURCE_PASSWORD:${DB_PASS:moone_data_vue}}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      idle-timeout: 60000
      connection-timeout: 30000

server:
  port: 8080